[colors]
background = #1a1a1a
foreground = #ff8800
accent = #ff6600
muted = #555555
urgent = #ff3300
green = #a6e3a1
yellow = #f9e2af
red = #f38ba8

[bar/mybar]
monitor = ${env:MONITOR:eDP-1}
width = 98%
offset-x = 1%
offset-y = 8
height = 30
radius = 10
fixed-center = true

background = ${colors.background}
foreground = ${colors.foreground}

padding-left = 2
padding-right = 2
module-margin = 1

font-0 = monospace:size=10:weight=bold
font-1 = Nerd Fonts Symbols Only:size=12

modules-left = logo bspwm
modules-center = date
modules-right = battery sep cpu sep memory sep volume

wm-restack = bspwm

[module/sep]
type = custom/text
content = "|"
content-foreground = ${colors.muted}

[module/bspwm]
type = internal/bspwm

label-focused = %name%
label-focused-foreground = #000000
label-focused-background = ${colors.accent}
label-focused-padding = 2

label-occupied = %name%
label-occupied-foreground = ${colors.foreground}
label-occupied-padding = 2

label-urgent = %name%
label-urgent-foreground = ${colors.urgent}
label-urgent-padding = 2

label-empty = %name%
label-empty-foreground = ${colors.muted}
label-empty-padding = 2

[module/date]
type = internal/date
interval = 1
date = %a %d %b
time = %H:%M:%S
label = %date%  %time%
label-foreground = ${colors.foreground}

[module/battery]
type = internal/battery
battery = BAT0
adapter = AC
full-at = 99
poll-interval = 5

label-charging = %percentage%%+
label-charging-foreground = ${colors.green}

label-discharging = %percentage%%-
label-discharging-foreground = ${colors.yellow}

label-full = 100%%
label-full-foreground = ${colors.green}

[module/cpu]
type = internal/cpu
interval = 2
label = cpu %percentage%%
label-foreground = ${colors.foreground}
format-warn = <label-warn>
label-warn = cpu %percentage%%
label-warn-foreground = ${colors.urgent}
warn-percentage = 80

[module/memory]
type = internal/memory
interval = 2
label = ram %percentage_used%%
label-foreground = ${colors.foreground}
format-warn = <label-warn>
label-warn = ram %percentage_used%%
label-warn-foreground = ${colors.urgent}
warn-percentage = 80

[module/volume]
type = internal/pulseaudio
scroll-up = pamixer -i 2
scroll-down = pamixer -o 2
format-volume = <label-volume>
label-volume = vol %percentage%%
label-volume-foreground = ${colors.foreground}
label-muted = vol muted
label-muted-foreground = ${colors.muted}