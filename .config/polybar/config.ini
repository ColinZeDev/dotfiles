[colors]
background = #1a1a1a
foreground = #ff8800
accent = #ff6600
muted = #555555
urgent = #ff3300
green = #a6e3a1
yellow = #f9e2af
red = #f38ba8
darkdarkorange = #885838

[bar/coolfuckingorangebar]
monitor = ${env:MONITOR:eDP-1}
width = 98%
offset-x = 1%
offset-y = 8
height = 30
radius = 10
fixed-center = true

background = ${colors.background}
foreground = ${colors.foreground}

padding-left = 2
padding-right = 2
module-margin = 1

font-0 = Fira Code:size=10:weight=bold;2
font-1 = Symbols Nerd Font Mono:size=13;3
font-2 = Symbols Nerd Font Mono:size=16;3

modules-left = archlogo sep bspwm
modules-center = date
modules-right = activewindow sep cpu sep memory sep volume sep battery

wm-restack = bspwm

[module/sep]
type = custom/text
content = "|"
content-foreground = ${colors.muted}

[module/archlogo]
type = custom/text
content = "%{T3}%{T-}"
content-foreground = ${colors.foreground}
click-left = rofi -show drun &

[module/bspwm]
type = internal/bspwm

label-focused = " %name% "
label-focused-foreground = #000000
label-focused-background = ${colors.accent}
label-focused-padding = 1

label-occupied = " %name% "
label-occupied-foreground = ${colors.foreground}
label-occupied-padding = 1

label-urgent = " %name% "
label-urgent-foreground = ${colors.urgent}
label-urgent-padding = 1

label-empty = " %name% "
label-empty-foreground = ${colors.muted}
label-empty-padding = 1

[module/activewindow]
type = custom/script
exec = zsh ~/.config/bspwm/scripts/get-active-window.zsh
interval = 1
label =  %output:0:40%
label-foreground = ${colors.darkdarkorange}

[module/date]
type = internal/date
interval = 1
date = %a, %B %d
time = %H:%M:%S
label =  %date%  %time%
label-foreground = ${colors.foreground}

[module/battery]
type = custom/script
exec = zsh ~/.config/bspwm/scripts/battery.zsh
interval = 3

[module/cpu]
type = internal/cpu
interval = 2
label =   %percentage%%
label-foreground = ${colors.foreground}
format-warn = <label-warn>
label-warn =   %percentage%%
label-warn-foreground = ${colors.urgent}
warn-percentage = 80

[module/memory]
type = internal/memory
interval = 2
label =  %percentage_used%%
label-foreground = ${colors.foreground}
format-warn = <label-warn>
label-warn =  %percentage_used%%
label-warn-foreground = ${colors.urgent}
warn-percentage = 80

[module/volume]
type = internal/pulseaudio
scroll-up = pamixer -i 2
scroll-down = pamixer -d 2
format-volume = <label-volume>
label-volume = 󰕾 %percentage%%
label-volume-foreground = ${colors.foreground}
label-muted = 󰝟 muted
label-muted-foreground = ${colors.muted}
