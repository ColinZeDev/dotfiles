# Backend
backend = "glx"
vsync = true

# Rounded corners
corner-radius = 10
rounded-corners-exclude = [
    "class_g = 'Polybar'",
    "class_g = 'LibreWolf'"
];

# Shadows
shadow = true
shadow-radius = 12
shadow-opacity = 0.6
shadow-offset-x = -8
shadow-offset-y = -8
shadow-exclude = [
    "class_g = 'Polybar'"
];

# Fading
fading = true
fade-in-step = 0.06
fade-out-step = 0.06
fade-delta = 3
no-fading-openclose = false

# Animations
animations = true
animation-stiffness = 200
animation-dampening = 25
animation-mass = 1
animation-for-open-window = "zoom"
animation-for-unmap-window = "zoom"
animation-for-transient-window = "slide-up"

# Opacity
inactive-opacity = 0.92
active-opacity = 1.0
frame-opacity = 1.0

# Blur
blur-method = "dual_kawase"
blur-strength = 5
blur-background = true
blur-background-frame = true
blur-background-exclude = [
    "class_g = 'Polybar'"
];
blur-background-include = [
    "class_g = 'Dunst'"
]

window-shader-fg-rule = [
    "default:class_g = 'Dunst'"
]